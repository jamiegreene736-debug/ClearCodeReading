<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1254 1254" role="img" aria-labelledby="title desc">
  <title id="title">Clear Code Reading difference mobile comparison</title>
  <desc id="desc">Four rounded cartoon tiles comparing tech-only apps, human review, static worksheets, and adaptive curriculum.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#2C3E50" flood-opacity=".13"/>
    </filter>
    <linearGradient id="outerBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFF9EA"/>
      <stop offset=".52" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF5F5"/>
    </linearGradient>
    <clipPath id="tile1"><rect x="50" y="52" width="562" height="562" rx="36"/></clipPath>
    <clipPath id="tile2"><rect x="642" y="52" width="562" height="562" rx="36"/></clipPath>
    <clipPath id="tile3"><rect x="50" y="642" width="562" height="562" rx="36"/></clipPath>
    <clipPath id="tile4"><rect x="642" y="642" width="562" height="562" rx="36"/></clipPath>
    <style>
      .title{font-family:Inter,Avenir Next,Nunito Sans,Arial,sans-serif;font-weight:900;font-size:39px;fill:#2C3E50}
      .copy{font-family:Inter,Avenir Next,Nunito Sans,Arial,sans-serif;font-weight:800;font-size:22px;fill:#2C3E50}
    </style>
  </defs>
  <rect width="1254" height="1254" fill="none"/>
  <g filter="url(#shadow)">
    <rect x="20" y="20" width="1214" height="1214" rx="58" fill="url(#outerBg)" stroke="#F0E2CF" stroke-width="3"/>

    <g clip-path="url(#tile1)">
      <rect x="50" y="52" width="562" height="562" rx="36" fill="#FFFDF6"/>
      <svg x="50" y="276" width="562" height="338" viewBox="285 105 483 430" preserveAspectRatio="xMidYMid slice">
        <image href="clear-code-difference-comparison.png" width="1536" height="1024"/>
      </svg>
      <rect x="50" y="276" width="44" height="338" fill="#FFFDF6"/>
      <rect x="548" y="276" width="64" height="338" fill="#FFFDF6"/>
      <rect x="50" y="52" width="562" height="256" fill="#FFFFFF"/>
    </g>
    <rect x="50" y="52" width="562" height="562" rx="36" fill="none" stroke="#EADFD1" stroke-width="3"/>
    <text class="title" x="94" y="116">Tech-only apps</text>
    <text class="copy" x="94" y="164">
      <tspan x="94">Fast practice, but limited</tspan>
      <tspan x="94" dy="30">context when a child</tspan>
      <tspan x="94" dy="30">needs reassurance.</tspan>
    </text>
    <rect x="94" y="262" width="104" height="10" rx="5" fill="#00B8A9"/>

    <g clip-path="url(#tile2)">
      <rect x="642" y="52" width="562" height="562" rx="36" fill="#FFF7F7"/>
      <svg x="642" y="276" width="562" height="338" viewBox="900 115 636 420" preserveAspectRatio="xMidYMid slice">
        <image href="clear-code-difference-comparison.png" width="1536" height="1024"/>
      </svg>
      <rect x="642" y="276" width="166" height="338" fill="#FFF7F7"/>
      <rect x="642" y="52" width="562" height="256" fill="#FFF9F9"/>
    </g>
    <rect x="642" y="52" width="562" height="562" rx="36" fill="none" stroke="#FFD8D8" stroke-width="3"/>
    <text x="686" y="116" font-family="Inter,Avenir Next,Nunito Sans,Arial,sans-serif" font-size="39" font-weight="900" fill="#FF6B6B">Human review</text>
    <text class="copy" x="686" y="164">
      <tspan x="686">A real educator checks</tspan>
      <tspan x="686" dy="30">the result and adds</tspan>
      <tspan x="686" dy="30">warm context.</tspan>
    </text>
    <rect x="686" y="262" width="104" height="10" rx="5" fill="#FF6B6B"/>

    <g clip-path="url(#tile3)">
      <rect x="50" y="642" width="562" height="562" rx="36" fill="#F8FCFD"/>
      <svg x="50" y="866" width="562" height="338" viewBox="410 650 358 374" preserveAspectRatio="xMidYMid slice">
        <image href="clear-code-difference-comparison.png" width="1536" height="1024"/>
      </svg>
      <rect x="50" y="866" width="38" height="338" fill="#F8FCFD"/>
      <rect x="548" y="866" width="64" height="338" fill="#F8FCFD"/>
      <rect x="50" y="642" width="562" height="256" fill="#FFFFFF"/>
    </g>
    <rect x="50" y="642" width="562" height="562" rx="36" fill="none" stroke="#DDECEF" stroke-width="3"/>
    <text class="title" x="94" y="706">Static worksheets</text>
    <text class="copy" x="94" y="754">
      <tspan x="94">Helpful practice, but</tspan>
      <tspan x="94" dy="30">hard to personalize</tspan>
      <tspan x="94" dy="30">or measure.</tspan>
    </text>
    <rect x="94" y="852" width="104" height="10" rx="5" fill="#AAB8BD"/>

    <g clip-path="url(#tile4)">
      <rect x="642" y="642" width="562" height="562" rx="36" fill="#FFF9EA"/>
      <svg x="642" y="866" width="562" height="338" viewBox="850 560 686 464" preserveAspectRatio="xMidYMid slice">
        <image href="clear-code-difference-comparison.png" width="1536" height="1024"/>
      </svg>
      <rect x="642" y="866" width="172" height="338" fill="#FFF9EA"/>
      <rect x="642" y="642" width="562" height="256" fill="#FFF9EA"/>
    </g>
    <rect x="642" y="642" width="562" height="562" rx="36" fill="none" stroke="#FFE8A3" stroke-width="3"/>
    <text x="686" y="706" font-family="Inter,Avenir Next,Nunito Sans,Arial,sans-serif" font-size="39" font-weight="900" fill="#E7A300">Adaptive path</text>
    <text class="copy" x="686" y="754">
      <tspan x="686">Lessons respond to</tspan>
      <tspan x="686" dy="30">decoding and real</tspan>
      <tspan x="686" dy="30">comprehension needs.</tspan>
    </text>
    <rect x="686" y="852" width="104" height="10" rx="5" fill="#FFD93D"/>
  </g>
</svg>
