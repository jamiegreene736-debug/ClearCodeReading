services:
  web:
    build: .
    command: gunicorn clearcodereading.wsgi:application --bind 0.0.0.0:8000 --workers 3
    env_file:
      - .env.example
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A clearcodereading worker -l info
    env_file:
      - .env.example
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: celery -A clearcodereading beat -l info
    env_file:
      - .env.example
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clearcodereading
      POSTGRES_USER: clearcode
      POSTGRES_PASSWORD: clearcode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
